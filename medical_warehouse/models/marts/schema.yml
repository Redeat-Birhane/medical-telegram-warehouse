version: 2

models:
  - name: dim_channels
    description: "Channel dimension — one row per Telegram channel"
    columns:
      - name: channel_key
        description: "Surrogate primary key"
        tests:
          - unique
          - not_null
      - name: channel_name
        description: "Telegram username"
        tests:
          - unique
          - not_null
      - name: channel_type
        description: "Category: Medical / Cosmetics / Pharmaceutical / Unknown"
        tests:
          - not_null
          - accepted_values:
              values: ["Medical", "Cosmetics", "Pharmaceutical", "Unknown"]

  - name: dim_dates
    description: "Date dimension spanning the full range of message dates"
    columns:
      - name: date_key
        description: "Integer date key in YYYYMMDD format"
        tests:
          - unique
          - not_null
      - name: full_date
        description: "Calendar date"
        tests:
          - unique
          - not_null

  - name: fct_messages
    description: "Fact table — one row per Telegram message"
    columns:
      - name: message_id
        description: "Natural key from Telegram"
        tests:
          - unique
          - not_null
      - name: channel_key
        description: "FK to dim_channels"
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key
      - name: date_key
        description: "FK to dim_dates"
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: view_count
        description: "Number of views"
        tests:
          - not_null
      - name: forward_count
        description: "Number of forwards"
        tests:
          - not_null